aid: gutenberg
name: Project Gutenberg
description: >-
  Project Gutenberg is a free ebook library providing access to over 75,000
  public domain books via the Gutendex REST API. The API enables developers to
  search and retrieve bibliographic metadata for books and authors, filter by
  language, copyright status, topic, and MIME type, and access download links
  for multiple formats including EPUB, Kindle, HTML, and plain text. Project
  Gutenberg has pioneered free ebooks since 1971 and the Gutendex API makes its
  catalog programmatically accessible via a simple JSON REST interface with no
  authentication required.
