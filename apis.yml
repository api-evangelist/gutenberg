apis:
  - aid: gutenberg:gutendex
    name: Gutendex API
    description: >-
      Gutendex is a JSON web API for Project Gutenberg ebook metadata. It
      provides access to the catalog of 75,000+ public domain books with
      filtering by language, copyright status, topic, author lifespan, and MIME
      type. The API returns paginated JSON results including book titles,
      authors, subjects, bookshelves, download formats, and download counts.
      No authentication or API key is required.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
